<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #ff9a00 0%, #d00000 40%, #120000 100%);
            color: #f8f0e3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: min(95%, 420px);
            padding: 30px 25px;
            border-radius: 24px;
            background: rgba(20, 8, 0, 0.85);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 180, 0, 0.25);
            text-align: center;
        }

        h2 {
            margin: 0 0 12px;
            font-size: 2rem;
            letter-spacing: 1px;
            text-shadow: 0 0 18px rgba(255, 120, 0, 0.55);
        }

        .subtitle {
            margin: 0 0 24px;
            color: #ffd8a8;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin: 0 auto 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        input:focus {
            border-color: #ffba00;
            background: rgba(255, 255, 255, 0.14);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        button {
            min-width: 118px;
            padding: 12px 18px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #ff5f1f, #c10000);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 28px rgba(255, 95, 31, 0.32);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(255, 116, 31, 0.45);
            background: linear-gradient(135deg, #ff961f, #e02b00);
        }

        #message {
            min-height: 28px;
            margin-top: 10px;
            color: #ffd98a;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>IOB Bank</h2>
        <p class="subtitle">Feed the IOB your gold and watch your treasure grow. Use the flames to deposit, withdraw, or check your balance.</p>
        <input type="number" id="amount" placeholder="Enter amount of gold 💰">
        <div class="button-row">
            <button type="button" onclick="deposit()">Deposit 🔥</button>
            <button type="button" onclick="withdraw()">Withdraw 🛡️</button>
            <button type="button" onclick="display(acc.checkBalance())">Check Balance 🧭</button>
        </div>
        <p id="message"></p>
    </div>
    <script>
        class BankAccount {
            balance = 0

            deposit(amount) {
                if (amount > 0) {
                    this.balance += amount
                    return 'Deposit: ' + amount
                }
                return 'Invalid amount'
            }

            withdraw(amount) {
                if (amount > this.balance) {
                    return 'Insufficient balance'
                }
                this.balance -= amount
                return 'Withdraw: ' + amount
            }

            checkBalance() {
                return 'Current balance: ' + this.balance
            }
        }

        const acc = new BankAccount()

        function display(message) {
            document.getElementById('message').textContent = message
        }

        function getAmount() {
            return Number(document.getElementById('amount').value)
        }

        function deposit() {
            display(acc.deposit(getAmount()))
        }

        function withdraw() {
            display(acc.withdraw(getAmount()))
        }
    </script>
</body>
</html>
